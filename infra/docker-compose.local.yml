services:
  postgres:
    image: supabase/postgres:15.1.1.78
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "${POSTGRES_PORT:-54322}:5432"
    volumes:
      - maidan-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres} -h localhost"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - maidan-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      COMMIT_SHA: ${COMMIT_SHA:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      REDIS_URL: redis://redis:6379
      AI_BASE_URL: http://ai:8000
      AI_INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN:-replace-me-internal-token}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-refresh-secret}
      PHONEPE_WEBHOOK_USERNAME: ${PHONEPE_WEBHOOK_USERNAME}
      PHONEPE_WEBHOOK_PASSWORD: ${PHONEPE_WEBHOOK_PASSWORD}
      PHONEPE_WEBHOOK_SECRET: ${PHONEPE_WEBHOOK_SECRET}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai:
    build:
      context: ..
      dockerfile: infra/ai.Dockerfile
    environment:
      PYTHON_ENV: development
      PORT: 8000
      COMMIT_SHA: ${COMMIT_SHA:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN:-replace-me-internal-token}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL_CONVERSATIONAL: ${OPENROUTER_MODEL_CONVERSATIONAL:-google/gemma-4-31b-it:free}
      OPENROUTER_MODEL_MODERATION: ${OPENROUTER_MODEL_MODERATION:-google/gemma-4-31b-it:free}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${AI_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  maidan-postgres-data:
  maidan-redis-data:
